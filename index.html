// ── MARKET STATE ──────────────────────────────────────────────────────────────
function getMarketState() {
  const et = new Date(new Date().toLocaleString("en-US", { timeZone: "America/New_York" }));
  const d = et.getDay(), m = et.getHours()*60 + et.getMinutes();
  if (d===0||d===6) return "CLOSED";
  if (m>=570&&m<960)  return "LIVE";
  if (m>=240&&m<570)  return "PRE";
  if (m>=960&&m<1200) return "POST";
  return "CLOSED";
}

function updateMarketIndicator() {
  const s = getMarketState();
  const colors = { LIVE:"#10B981", PRE:"#3B82F6", POST:"#F59E0B", CLOSED:"#374151" };
  const dot = document.getElementById("market-dot");
  const lbl = document.getElementById("market-label");
  dot.style.background = colors[s];
  dot.style.width = "5px"; dot.style.height = "5px"; dot.style.borderRadius = "50%"; dot.style.display = "inline-block"; dot.style.marginRight = "5px";
  if (s === "LIVE") dot.style.animation = "blink 2s infinite";
  lbl.textContent = "NYSE " + s;
  lbl.style.color = colors[s];
}

// ── PRICE FETCH ───────────────────────────────────────────────────────────────
async function fetchPrices(symbols) {
  const out = {};
  await Promise.allSettled(symbols.map(async sym => {
    try {
      const r = await fetch("https://query1.finance.yahoo.com/v8/finance/chart/" + sym + "?interval=1d&range=2d");
      const d = await r.json();
      const m = d?.chart?.result?.[0]?.meta;
      if (!m) return;
      const prev = m.chartPreviousClose ?? m.previousClose ?? m.regularMarketPrice;
      let price = m.regularMarketPrice, session = "CLOSE";
      if (m.marketState==="PRE" && m.preMarketPrice)   { price=m.preMarketPrice; session="PRE"; }
      if ((m.marketState==="POST"||m.marketState==="POSTPOST") && m.postMarketPrice) { price=m.postMarketPrice; session="POST"; }
      if (m.marketState==="REGULAR") session="LIVE";
      out[sym] = { price, chg: prev ? parseFloat(((price-prev)/prev*100).toFixed(2)) : 0, session };
    } catch { out[sym] = null; }
  }));
  return out;
}

// ── AI SCORING ────────────────────────────────────────────────────────────────
async function fetchAIScores(event) {
  const allTickers = [...new Set(event.sectors.flatMap(s => s.tickers))];
  const scoresTemplate = JSON.stringify(
    allTickers.reduce((acc, t) => { acc[t] = { score: 0, reason: "" }; return acc; }, {})
  );
  const sectorLines = event.sectors.map(s => s.name + " (" + s.dir + "): " + s.tickers.join(", ")).join("\n");

  const userMsg =
    "EVENT: " + event.label + "\n" +
    "DEMAND CHAIN: " + event.demandLogic + "\n\n" +
    "SECTORS:\n" + sectorLines + "\n\n" +
    "Score each ticker -100 to +100. Positive=demand surge. Negative=demand drop.\n" +
    "Reasons max 10 words each. No special characters.\n\n" +
    "Fill this template:\n" +
    '{"eventIntensity":0,"signal":"QUIET","lastSignal":"","demandSummary":"","headlines":[{"title":"","source":"","impact":"NEUTRAL","summary":""}],"scores":' + scoresTemplate + "}";

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 2000,
      system: "You output ONLY valid JSON. No prose, no markdown, no backticks, no explanation before or after. Your entire response must start with { and be parseable by JSON.parse().",
      messages: [{ role: "user", content: userMsg }]
    })
  });

  if (!res.ok) { const t = await res.text(); throw new Error("HTTP " + res.status + ": " + t.slice(0,100)); }
  const data = await res.json();
  if (data.type === "error") throw new Error(data.error?.message ?? "API error");

  const raw = (data.content ?? []).filter(b => b.type==="text").map(b => b.text).join("").trim()
    .replace(/^```[a-z]*\n?/i,"").replace(/\n?```$/i,"").trim();

  if (!raw) throw new Error("Respuesta vacia");
  const s = raw.indexOf("{"), e = raw.lastIndexOf("}");
  if (s === -1) throw new Error("Sin JSON. Recibido: " + raw.slice(0,80));
  return JSON.parse(raw.slice(s, e+1));
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function scoreColor(s) {
  if (s==null) return "#141414";
  const t = Math.min(Math.abs(s)/100, 1);
  return s>0 ? "rgba(16,185,129,"+(0.1+t*0.55)+")" : "rgba(239,68,68,"+(0.1+t*0.55)+")";
}
function scoreBorder(s) {
  if (s==null) return "#1f1f1f";
  if (s>40) return "#10B98155"; if (s<-40) return "#EF444455"; return "#1f1f1f";
}
function fmtScore(s) { return s>0 ? "+"+s : ""+s; }
function fmtChg(c)   { return c>=0 ? "+"+c+"%" : c+"%"; }
function iColor(n)   { return n>=70?"#EF4444":n>=40?"#F59E0B":"#10B981"; }
const sesColor = { LIVE:"#10B981", PRE:"#3B82F6", POST:"#F59E0B", CLOSE:"#374151" };
const impactColor = { BULLISH:"#10B981", BEARISH:"#EF4444", NEUTRAL:"#374151" };

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderSidebar() {
  const sidebar = document.getElementById("sidebar");
  let html = "";
  const seen = new Set();
  for (const [cat, meta] of Object.entries(CAT)) {
    html += `<div class="cat-header"><span class="cat-dot">${meta.dot}</span><span class="cat-label" style="color:${meta.color}">${meta.label}</span></div>`;
    for (const ev of EVENTS.filter(e=>e.cat===cat)) {
      const isAct = ev.id===activeId;
      const eAI   = aiCache[ev.id];
      const sig   = eAI?.signal;
      let badge = "";
      if (sig) {
        const bc = sig==="ACTIVE"?"#EF4444":sig==="ELEVATED"?"#F59E0B":"#10B981";
        badge = `<span class="signal-badge" style="background:${bc}22;color:${bc}">${sig}</span>`;
      }
      html += `<button class="ev-btn${isAct?" active":""}" onclick="switchEvent('${ev.id}')" style="border-left-color:${isAct?meta.color:"transparent"}">
        <div class="ev-title">${ev.label} ${badge}</div>
        <div class="ev-desc">${ev.desc}</div>
      </button>`;
    }
  }
  sidebar.innerHTML = html;
}

function renderTabs() {
  const tabs = document.getElementById("tabs");
  let html = "";
  EVENTS.forEach((ev, i) => {
    const meta = CAT[ev.cat];
    const isAct = ev.id===activeId;
    const eAI = aiCache[ev.id];
    const liveDot = eAI?.signal==="ACTIVE" ? `<div class="tab-live-dot"></div>` : "";
    html += `<button class="tab-btn${isAct?" active":""}" onclick="switchEvent('${ev.id}')" style="border-top-color:${isAct?meta.color:"transparent"}">
      <span class="tab-num">${i+1}</span>
      <span class="tab-icon" style="color:${isAct?meta.color:"#2a2a2a"}">${meta.dot}</span>
      <span class="tab-name">${ev.label.toUpperCase()}</span>
      ${liveDot}
    </button>`;
  });
  html += `<div id="tabs-right"><span id="scanning-label">INFERRING···</span></div>`;
  tabs.innerHTML = html;
}

function renderEventHeader(event, ai) {
  const meta = CAT[event.cat];
  let html = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div style="flex:1">
        <div class="ev-cat-tag" style="color:${meta.color}">${meta.dot} ${meta.label}</div>
        <div class="ev-name">${event.label}</div>
        <div class="ev-desc-text">${event.desc}</div>
        <div class="logic-pill">
          <span class="logic-tag">LOGICA</span>
          <span class="logic-text">${event.demandLogic}</span>
        </div>
      </div>
      ${ai?.eventIntensity!=null ? `<div style="text-align:right;flex-shrink:0;margin-left:20px"><div class="int-num" style="color:${iColor(ai.eventIntensity)}">${ai.eventIntensity}</div><div class="int-label">INTENSITY</div></div>` : ""}
    </div>`;

  if (ai?.eventIntensity!=null) {
    const sc = ai.signal==="ACTIVE"?"#EF4444":ai.signal==="ELEVATED"?"#F59E0B":"#10B981";
    html += `<div class="intensity-row">
      <span class="intensity-label">INTENSIDAD</span>
      <div class="intensity-bar-wrap"><div class="intensity-bar" style="width:${ai.eventIntensity}%;background:${iColor(ai.eventIntensity)}"></div></div>
      <span class="signal-badge" style="background:${sc}22;color:${sc};font-size:8px;padding:2px 7px">${ai.signal}</span>
    </div>`;
  }
  if (ai?.lastSignal) html += `<div class="last-signal">› ${ai.lastSignal}</div>`;

  document.getElementById("ev-header").innerHTML = html;
  document.getElementById("ev-header").style.borderBottomColor = meta.color + "18";
}

function renderLoadingState() {
  document.getElementById("ev-header").insertAdjacentHTML("beforeend",
    `<div class="loading-dots" id="loading-indicator">
      <div class="dot" style="animation:blink 1.2s ease 0s infinite"></div>
      <div class="dot" style="animation:blink 1.2s ease 0.2s infinite"></div>
      <div class="dot" style="animation:blink 1.2s ease 0.4s infinite"></div>
      <span class="scanning-text">INFERIENDO DEMANDA···</span>
    </div>`);
  const sl = document.getElementById("scanning-label");
  if (sl) sl.style.display = "inline";
}

function renderError(msg) {
  document.getElementById("ev-header").insertAdjacentHTML("beforeend",
    `<div class="error-row"><span class="error-text">⚠ ${msg}</span><button class="retry-btn" onclick="scan(true)">REINTENTAR</button></div>`);
  const sl = document.getElementById("scanning-label");
  if (sl) sl.style.display = "none";
}

function renderTopMovers(scores) {
  const entries = Object.entries(scores).filter(([,v])=>v?.score!=null)
    .sort((a,b)=>Math.abs(b[1].score)-Math.abs(a[1].score)).slice(0,6);
  if (!entries.length) { document.getElementById("top-movers").innerHTML=""; return; }
  let html = `<span class="mover-label">MAYOR SENAL</span>`;
  for (const [sym,v] of entries) {
    const c = v.score>0?"#10B981":"#EF4444";
    html += `<span class="mover-chip" style="background:${c}14;color:${c};border:1px solid ${c}30">${sym} ${fmtScore(v.score)}</span>`;
  }
  document.getElementById("top-movers").innerHTML = html;
}

function renderHeatmap(event, ai) {
  const scores = ai?.scores ?? {};
  const loading = aiRunning;
  let html = "";
  for (const sec of event.sectors) {
    const dc = {LONG:"#10B981",SHORT:"#EF4444",WATCH:"#F59E0B"}[sec.dir];
    const dl = {LONG:"▲ LONG",SHORT:"▼ SHORT",WATCH:"◈ WATCH"}[sec.dir];
    const vals = sec.tickers.map(t=>scores[t]?.score).filter(v=>v!=null);
    const avg  = vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length) : null;
    html += `<div class="sector-block">
      <div class="sector-header">
        <span class="sector-dir" style="color:${dc}">${dl}</span>
        <span class="sector-name">${sec.name.toUpperCase()}</span>
        ${avg!=null?`<span class="sector-avg" style="color:${avg>0?"#10B981":"#EF4444"}">avg ${fmtScore(avg)}</span>`:""}
        <div class="sector-line"></div>
      </div>
      <div class="tickers-row">`;
    for (const sym of sec.tickers) {
      const sc = scores[sym]?.score;
      const reason = scores[sym]?.reason ?? "";
      const d = prices[sym];
      const hot = sc!=null && Math.abs(sc)>=50;
      html += `<div class="ticker-cell" style="background:${scoreColor(sc)};border:1px solid ${scoreBorder(sc)};box-shadow:${hot?("0 0 10px "+(sc>0?"#10B98118":"#EF444418")):"none"}">
        ${d?.session?`<span class="ses-tag" style="color:${sesColor[d.session]??"#555"}">${d.session}</span>`:""}
        ${hot?`<div class="hot-dot" style="background:${sc>0?"#10B981":"#EF4444"}"></div>`:""}
        <div class="sym" style="margin-top:${d?.session?8:0}px">${sym}</div>
        ${loading&&sc==null
          ? `<div class="dots-loading">···</div>`
          : sc!=null
            ? `<div class="score-val" style="color:${sc>0?"#10B981":sc<0?"#EF4444":"#555"}">${fmtScore(sc)}</div>`
            : `<div style="font-size:9px;color:#2a2a2a;margin-top:4px">—</div>`
        }
        ${d?.price!=null?`<div class="price-row"><span class="price-val">$${d.price.toFixed(2)}</span><span class="chg-val" style="color:${d.chg>=0?"#10B98166":"#EF444466"}">${fmtChg(d.chg)}</span></div>`:""}
        ${reason?`<div class="tooltip">${reason}</div>`:""}
      </div>`;
    }
    html += `</div></div>`;
  }
  document.getElementById("heatmap").innerHTML = html;
}

function renderWire(ai) {
  const ds = document.getElementById("demand-summary");
  const dst = document.getElementById("ds-text");
  if (ai?.demandSummary) { ds.style.display="block"; dst.textContent=ai.demandSummary; }
  else { ds.style.display="none"; }

  const feed = document.getElementById("wire-feed");
  if (!ai?.headlines?.length) { feed.innerHTML='<div id="wire-empty">SIN SENALES</div>'; return; }
  let html = "";
  for (const h of ai.headlines) {
    const dc = impactColor[h.impact] ?? "#374151";
    html += `<div class="headline-item">
      <div class="hl-meta"><div class="hl-dot" style="background:${dc}"></div><span class="hl-source">${(h.source??"").toUpperCase()}</span></div>
      <div class="hl-title">${h.title}</div>
      <div class="hl-summary">${h.summary}</div>
    </div>`;
  }
  feed.innerHTML = html;
}

// ── FULL RENDER ───────────────────────────────────────────────────────────────
function render(loadingAI, error) {
  const event = EVENTS.find(e=>e.id===activeId);
  const ai    = aiCache[activeId];
  renderSidebar();
  renderTabs();
  renderEventHeader(event, ai);
  if (loadingAI && !ai) renderLoadingState();
  if (error) renderError(error);
  if (ai) { renderTopMovers(ai.scores??{}); }
  renderHeatmap(event, ai);
  renderWire(ai);
  updateMarketIndicator();
  const lu = document.getElementById("last-upd");
  if (lu) lu.textContent = new Date().toLocaleTimeString("es-AR");
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function switchEvent(id) {
  activeId = id;
  const event = EVENTS.find(e=>e.id===id);
  const allTickers = [...new Set(event.sectors.flatMap(s=>s.tickers))];
  render(aiRunning, null);
  loadPrices(allTickers);
  runAI(false);
}

async function loadPrices(tickers) {
  if (!tickers) { const ev=EVENTS.find(e=>e.id===activeId); tickers=[...new Set(ev.sectors.flatMap(s=>s.tickers))]; }
  try { prices = await fetchPrices(tickers); render(aiRunning, null); } catch {}
}

async function runAI(force) {
  if (aiRunning) return;
  const ex = aiCache[activeId];
  if (!force && ex && Date.now()-ex.ts < 5*60*1000) return;
  aiRunning = true;
  const btn = document.getElementById("scan-btn");
  if (btn) { btn.textContent="ANALIZANDO···"; btn.disabled=true; }
  render(true, null);
  const event = EVENTS.find(e=>e.id===activeId);
  try {
    const result = await fetchAIScores(event);
    aiCache[activeId] = { ...result, ts: Date.now() };
    render(false, null);
  } catch(e) {
    render(false, e.message);
  }
  aiRunning = false;
  if (btn) { btn.textContent="↺ SCAN"; btn.disabled=false; }
  const sl = document.getElementById("scanning-label");
  if (sl) sl.style.display = "none";
}

async function scan(force=false) {
  const event = EVENTS.find(e=>e.id===activeId);
  await loadPrices([...new Set(event.sectors.flatMap(s=>s.tickers))]);
  await runAI(force);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
setInterval(updateMarketIndicator, 1000);
priceTimer = setInterval(() => { const ev=EVENTS.find(e=>e.id===activeId); loadPrices([...new Set(ev.sectors.flatMap(s=>s.tickers))]); }, 60000);

render(false, null);
scan(false);
</script>

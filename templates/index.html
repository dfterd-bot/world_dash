<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#154060;color:#fff;font-family:'Inter',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:2px;background:#154060}
::-webkit-scrollbar-thumb{background:#1e527a}

#topbar{background:#112f4e;border-bottom:1px solid #1e527a;padding:0 16px;height:40px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.brand{font-size:11px;font-weight:700;color:#fff;letter-spacing:3px}
.tag{font-size:9px;color:#4a8aaa;letter-spacing:2px;margin-left:10px}
.tb-right{display:flex;align-items:center;gap:12px}
#market-dot{width:5px;height:5px;border-radius:50%;display:inline-block;margin-right:5px}
#market-label{font-size:9px;letter-spacing:2px}
#scan-btn{background:transparent;border:1px solid #1e527a;color:#7dd3fc;font-size:9px;padding:3px 10px;cursor:pointer;letter-spacing:1px;border-radius:2px}
#wire-toggle-btn{display:none;background:transparent;border:1px solid #EF444433;color:#EF4444;font-size:9px;padding:3px 10px;cursor:pointer;border-radius:2px;letter-spacing:1px}

#layout{flex:1;display:flex;overflow:hidden}

#sidebar{width:185px;background:#112f4e;border-right:1px solid #1e527a;overflow-y:auto;flex-shrink:0}
.cat-hdr{padding:8px 12px 5px;border-bottom:1px solid #1a3d5c;display:flex;align-items:center;gap:6px}
.cat-lbl{font-size:8px;letter-spacing:3px;font-weight:700}
.ev-btn{width:100%;background:transparent;border:none;border-bottom:1px solid #1a3d5c;border-left:2px solid transparent;padding:8px 12px;cursor:pointer;text-align:left;transition:all 0.15s;color:inherit}
.ev-btn:hover{background:#1a3d5c}
.ev-btn.active{background:#1a4060}
.ev-title{font-size:10px;color:#7dd3fc;display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.ev-btn.active .ev-title{color:#fff;font-weight:700}
.ev-desc-s{font-size:9px;color:#4a8aaa;line-height:1.4}
.sig-badge{font-size:7px;padding:1px 4px;border-radius:1px;letter-spacing:1px;font-weight:700}

#main{flex:1;overflow-y:auto;background:#154060;display:flex;flex-direction:column}
#main-inner{padding:16px 20px;flex:1}
#ev-hdr{padding-bottom:12px;margin-bottom:12px;border-bottom:1px solid #1e527a33}
#top-movers{margin-bottom:12px;display:flex;gap:5px;align-items:center;flex-wrap:wrap;min-height:20px}
#heatmap{}
.mover-lbl{font-size:8px;color:#4a8aaa;letter-spacing:2px}
.mover-chip{font-family:monospace;font-size:10px;font-weight:700;padding:2px 7px;border-radius:2px}

.sec-block{margin-bottom:18px}
.sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sec-dir{font-size:8px;font-weight:700;letter-spacing:2px}
.sec-name{font-size:8px;color:#4a8aaa;letter-spacing:2px}
.sec-avg{font-size:9px;font-family:monospace;font-weight:700}
.sec-line{flex:1;height:1px;background:#1e527a}
.tickers-row{display:flex;gap:5px;flex-wrap:wrap}

.tc{border-radius:3px;padding:9px 10px;min-width:86px;position:relative;transition:background 0.8s ease;cursor:default}
.tc .ses-tag{position:absolute;top:3px;left:5px;font-size:7px;font-weight:700;letter-spacing:1px}
.tc .hot-dot{position:absolute;top:4px;right:4px;width:4px;height:4px;border-radius:50%;animation:blink 1s step-end infinite}
.tc .sym{font-family:monospace;font-size:11px;font-weight:700;color:#fff}
.tc .score-val{font-size:14px;font-weight:800;font-family:monospace;margin-top:2px;line-height:1}
.rsi-row{display:flex;align-items:center;gap:4px;margin-top:4px}
.rsi-val{font-size:10px;font-family:monospace;font-weight:700}
.rsi-badge{font-size:7px;padding:1px 4px;border-radius:2px;font-weight:700;letter-spacing:1px}
.tc .price-row{margin-top:3px;display:flex;gap:3px}
.tc .pv{font-size:9px;color:#4a8aaa;font-family:monospace}
.tc .cv{font-size:9px;font-family:monospace}
.tc .dots-l{font-size:10px;color:#2a4a6a;margin-top:4px;animation:blink 1.5s infinite}
.rsi-loading{display:inline-block;width:10px;height:10px;border:1px solid #1e527a;border-top-color:#7dd3fc;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-top:4px}
.tooltip{display:none;position:absolute;bottom:calc(100% + 5px);left:0;z-index:99;background:#0a1929;border:1px solid #1e527a;border-radius:4px;padding:7px 9px;width:210px;font-size:10px;color:#aaa;line-height:1.6;pointer-events:none}
.tc:hover .tooltip{display:block}

.ai-loading{margin-top:10px;display:flex;align-items:center;gap:8px}
.ai-dot{width:4px;height:4px;border-radius:50%;background:#1e527a}
.ai-txt{font-size:9px;color:#4a8aaa;letter-spacing:2px}
.err-row{margin-top:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.err-txt{font-size:9px;color:#EF4444}
.retry-btn{background:transparent;border:1px solid #EF444433;color:#EF4444;font-size:9px;padding:2px 8px;cursor:pointer;border-radius:2px}

#legend{padding:8px 20px;border-top:1px solid #1e527a33;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;flex-wrap:wrap;gap:6px}
.leg-txt{font-size:8px;color:#4a8aaa;letter-spacing:1px}
.leg-items{display:flex;gap:10px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:3px}
.leg-dot{width:6px;height:6px;border-radius:1px}
.leg-item span{font-size:8px;color:#4a8aaa}

#wire{width:250px;border-left:1px solid #1e527a;display:flex;flex-direction:column;background:#112f4e;flex-shrink:0}
#wire-hdr{padding:9px 13px;border-bottom:1px solid #1e527a;display:flex;align-items:center;gap:8px}
.wire-dot{width:5px;height:5px;border-radius:50%;background:#EF4444;animation:blink 1.5s step-end infinite}
.wire-title{font-size:9px;color:#EF4444;letter-spacing:3px;font-weight:700}
#demand-sum{padding:9px 13px;border-bottom:1px solid #1a3d5c;background:#0d2035;display:none}
.ds-tag{font-size:8px;color:#3B82F6;letter-spacing:2px;margin-bottom:4px;font-weight:700}
.ds-txt{font-size:10px;color:#7aa;line-height:1.6}
#wire-feed{flex:1;overflow-y:auto}
.hl-item{padding:10px 13px;border-bottom:1px solid #1a3d5c;cursor:default}
.hl-item:hover{background:#1a3d5c}
.hl-meta{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.hl-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.hl-src{font-size:8px;color:#4a8aaa;letter-spacing:1px}
.hl-title{font-size:10px;color:#bbb;line-height:1.5;margin-bottom:3px}
.hl-sum{font-size:9px;color:#4a8aaa;line-height:1.4}
#wire-empty{padding:13px;font-size:9px;color:#4a8aaa;letter-spacing:1px}

#tabs{background:#112f4e;border-top:1px solid #1e527a;display:flex;height:34px;flex-shrink:0;overflow-x:auto}
.tab-btn{background:transparent;border:none;border-right:1px solid #1a3d5c;border-top:2px solid transparent;padding:0 11px;cursor:pointer;display:flex;align-items:center;gap:4px;flex-shrink:0;color:inherit}
.tab-btn.active{background:#1a4060}
.tab-num{font-size:7px;color:#4a8aaa;font-weight:700}
.tab-btn.active .tab-num{color:#fff}
.tab-icon{font-size:8px;color:#4a8aaa}
.tab-name{font-size:8px;color:#4a8aaa;letter-spacing:1px;white-space:nowrap}
.tab-btn.active .tab-name{color:#7dd3fc}
.tab-live{width:4px;height:4px;border-radius:50%;background:#EF4444;animation:blink 1s step-end infinite;flex-shrink:0}
#tabs-right{flex:1;display:flex;align-items:center;justify-content:flex-end;padding:0 12px}
#scan-lbl{font-size:8px;color:#4a8aaa;letter-spacing:2px;animation:blink 1s infinite;display:none}

#mobile-pills{display:none;overflow-x:auto;white-space:nowrap;padding:7px 12px;border-bottom:1px solid #1e527a;background:#112f4e;flex-shrink:0}

@media(max-width:768px){
  #sidebar{display:none}
  #wire{display:none;position:fixed;top:40px;left:0;right:0;bottom:34px;z-index:50;width:100%}
  #wire.open{display:flex}
  #wire-toggle-btn{display:block}
  #mobile-pills{display:block}
  #main-inner{padding:12px 12px}
  .tc{min-width:76px;padding:8px 8px}
  #legend{display:none}
  .tag{display:none}
}
</style>
</head>

const sesCol   = {LIVE:"#10B981",PRE:"#3B82F6",POST:"#F59E0B",CLOSED:"#4a8aaa"};
const impCol   = {BULLISH:"#10B981",BEARISH:"#EF4444",NEUTRAL:"#4a8aaa"};

function rsiColor(r){if(r==null)return"#4a8aaa";if(r<=30)return"#3B82F6";if(r<=35)return"#60A5FA";if(r>=70)return"#F59E0B";if(r>=65)return"#FCD34D";return"#4a8aaa"}
function rsiLabel(r){if(r==null)return"";if(r<=30)return"OVERSOLD";if(r<=35)return"OVS";if(r>=70)return"OVERBOUGHT";if(r>=65)return"OVB";return""}

function getMS(){
  const et=new Date(new Date().toLocaleString("en-US",{timeZone:"America/New_York"}));
  const d=et.getDay(),m=et.getHours()*60+et.getMinutes();
  if(d===0||d===6)return"CLOSED";
  if(m>=570&&m<960)return"LIVE";
  if(m>=240&&m<570)return"PRE";
  if(m>=960&&m<1200)return"POST";
  return"CLOSED";
}

function updateMarket(){
  const s=getMS(),c={LIVE:"#10B981",PRE:"#3B82F6",POST:"#F59E0B",CLOSED:"#4a8aaa"};
  const dot=document.getElementById("market-dot");
  if(dot){dot.style.cssText=`width:5px;height:5px;border-radius:50%;display:inline-block;margin-right:5px;background:${c[s]}`;if(s==="LIVE")dot.style.animation="blink 2s infinite";}
  const lbl=document.getElementById("market-label");
  if(lbl){lbl.textContent="NYSE "+s;lbl.style.color=c[s];}
}

function eventsSortedByIntensity(){
  return [...EVENTS].sort((a,b)=>{
    const ia=aiCache[a.id]?.eventIntensity??INTENSITY[a.id]??0;
    const ib=aiCache[b.id]?.eventIntensity??INTENSITY[b.id]??0;
    return ib-ia;
  });
}

// ── PRICE FETCH ───────────────────────────────────────────────────────────────
async function fetchRSI(sym){
  if(rsiCache[sym]&&Date.now()-rsiCache[sym].ts<5*60*1000)return rsiCache[sym];
  try{
    const r=await fetch("/api/price/"+sym);
    const d=await r.json();
    const res=d?.chart?.result?.[0];
    if(!res)return null;
    const closes=(res.indicators?.quote?.[0]?.close??[]).filter(v=>v!=null);
    const m=res.meta;
    const prev=m._prevClose??closes[closes.length-2]??m.regularMarketPrice;
    let price=m.regularMarketPrice,session=m._sessionLabel??"CLOSED";
    if(m.marketState==="PRE"&&m.preMarketPrice)price=m.preMarketPrice;
    if((m.marketState==="POST"||m.marketState==="POSTPOST")&&m.postMarketPrice)price=m.postMarketPrice;
    function calcRSI(c,p=14){
      if(c.length<p+1)return null;
      let g=0,l=0;
      for(let i=1;i<=p;i++){const d=c[i]-c[i-1];d>0?g+=d:l+=Math.abs(d);}
      let ag=g/p,al=l/p;
      for(let i=p+1;i<c.length;i++){const d=c[i]-c[i-1];ag=(ag*(p-1)+(d>0?d:0))/p;al=(al*(p-1)+(d<0?Math.abs(d):0))/p;}
      return al===0?100:parseFloat((100-(100/(1+ag/al))).toFixed(1));
    }
    const rsi=calcRSI(closes);
    const chg=prev?parseFloat(((price-prev)/prev*100).toFixed(2)):0;
    const obj={rsi,price,chg,session,ts:Date.now()};
    rsiCache[sym]=obj;
    return obj;
  }catch{return null;}
}

async function fetchAIScores(event){
  const res=await fetch("/api/score/"+event.id);
  if(!res.ok)throw new Error("HTTP "+res.status);
  const data=await res.json();
  if(data.error)throw new Error(data.error);
  return data;
}

  if(!event)return;
  const ai=aiCache[activeId];

  renderEventHeader(event,ai);

  if(loadingAI&&!ai){
    const el=document.getElementById("ev-hdr");
    if(el)el.insertAdjacentHTML("beforeend",`<div class="ai-loading" id="ai-load"><div class="ai-dot" style="animation:blink 1.2s 0s infinite"></div><div class="ai-dot" style="animation:blink 1.2s 0.2s infinite"></div><div class="ai-dot" style="animation:blink 1.2s 0.4s infinite"></div><span class="ai-txt">INFERIENDO DEMANDA···</span></div>`);
  }
  if(error){
    const el=document.getElementById("ev-hdr");
    if(el)el.insertAdjacentHTML("beforeend",`<div class="err-row"><span class="err-txt">⚠ ${error}</span><button class="retry-btn" onclick="scan(true)">REINTENTAR</button></div>`);
  }

  if(ai)renderTopMovers(ai.sectors);
  renderHeatmap(event,ai);
  renderWire(ai);

  const lu=document.getElementById("last-upd");
  if(lu)lu.textContent=new Date().toLocaleTimeString("es-AR");
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function switchEvent(id){
  activeId=id;
  if(id==="HOT"){render(false,null);fetchHotTickers();return;}
  if(id==="OVERVIEW"){render(false,null);return;}
  render(aiRunning,null);
  runAI(false);
}

async function runAI(force){
  if(aiRunning)return;
  const ex=aiCache[activeId];
  if(!force&&ex&&Date.now()-ex.ts<5*60*1000){refreshRSI();return;}
  aiRunning=true;
  const btn=document.getElementById("scan-btn");
  if(btn){btn.textContent="···";btn.disabled=true;}
  const sl=document.getElementById("scan-lbl");
  if(sl)sl.style.display="inline";
  render(true,null);
  const event=EVENTS.find(e=>e.id===activeId);
  if(!event){aiRunning=false;if(btn){btn.textContent="↺ SCAN";btn.disabled=false;}if(sl)sl.style.display="none";return;}
  try{
    const result=await fetchAIScores(event);
    aiCache[activeId]={...result,ts:Date.now()};
    render(false,null);
    refreshRSI();
  }catch(e){render(false,e.message);}
  aiRunning=false;
  if(btn){btn.textContent="↺ SCAN";btn.disabled=false;}
  if(sl)sl.style.display="none";
}

async function scan(force=false){await runAI(force);}
function toggleWire(){document.getElementById("wire")?.classList.toggle("open");}

// ── INIT ──────────────────────────────────────────────────────────────────────
setInterval(updateMarket,1000);
setInterval(refreshRSI,60000);
render(false,null);
</script>

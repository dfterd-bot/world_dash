<script>
// ── EVENTS ────────────────────────────────────────────────────────────────────
const EVENTS = [

  { id:"FLU",       cat:"SALUD",   label:"Gripe severa",    desc:"Temporada de gripe inusualmente intensa",                     demandLogic:"Severe flu season drives antiviral sales rapid testing and pharmacy traffic", sectors:["Antivirals","Diagnostics","Pharmacy Retail","Hospitals"] },
  { id:"HORMUZ",    cat:"GEO",     label:"Tension Hormuz",  desc:"Bloqueo o ataque en Estrecho de Hormuz",                     demandLogic:"Blockade restricts oil supply causing price spike benefiting producers and hurting airlines", sectors:["Oil E&P","Oilfield Services","Airlines","Shipping"] },
  { id:"TAIWAN",    cat:"GEO",     label:"Escalada Taiwan", desc:"Tension militar en estrecho de Taiwan",                       demandLogic:"Taiwan conflict drives defense spending and semiconductor supply chain panic", sectors:["Defense","Gold Safe Haven","Semiconductors","Consumer Retail"] },
  { id:"NATO",      cat:"GEO",     label:"Escalada OTAN",   desc:"Confrontacion directa o incidente en frontera OTAN",          demandLogic:"NATO conflict drives weapons procurement energy demand and safe haven flows", sectors:["Defense","Energy","Safe Haven Assets","Risk-Off ETFs"] },
  { id:"AI_BOOM",   cat:"TECH",    label:"Boom de IA",      desc:"Inversion masiva en infraestructura de IA",                   demandLogic:"AI scaling drives demand for chips power datacenters cooling and fiber networks", sectors:["AI Chips","Data Center Power","Cooling Infrastructure","Fiber Networks"] },
  { id:"CYBER",     cat:"TECH",    label:"Cyberattack",     desc:"Ataque a infraestructura critica o sistema bancario",         demandLogic:"Cyberattack triggers emergency demand for cybersecurity solutions", sectors:["Cybersecurity","Defense IT","Banks affected","Utilities affected"] },
  { id:"SUPERBOWL", cat:"CONSUMO", label:"Evento masivo",   desc:"Super Bowl, Mundial u otro evento de audiencia global",       demandLogic:"Mass event drives food beverage streaming advertising and delivery demand", sectors:["Beverages Snacks","Streaming Advertising","Delivery Apps","Retail"] },
  { id:"BTS",       cat:"CONSUMO", label:"Back to School",  desc:"Temporada de alta demanda de consumo masivo",                 demandLogic:"Seasonal spending surge drives electronics apparel and logistics demand", sectors:["Retail","Consumer Electronics","Logistics","Apparel"] },
];

const CAT = {
  CLIMA:   { label:"CLIMA",    color:"#3B82F6", dot:"🌩" },
  SALUD:   { label:"SALUD",    color:"#10B981", dot:"🦠" },
  GEO:     { label:"GEOPOLIT", color:"#EF4444", dot:"🌐" },
  TECH:    { label:"TECH",     color:"#8B5CF6", dot:"⚡" },
  CONSUMO: { label:"CONSUMO",  color:"#F59E0B", dot:"📦" },
};

// ── STATE ─────────────────────────────────────────────────────────────────────
let activeId  = "HORMUZ";
let aiCache   = {};      // { [eventId]: { sectors:[{name,dir,tickers:[{sym,score,reason}]}], ... } }
let rsiCache  = {};      // { [sym]: { rsi, price, chg, session, ts } }
let aiRunning = false;
let priceTimer = null;

// ── MARKET STATE ──────────────────────────────────────────────────────────────
function getMS() {
  const et = new Date(new Date().toLocaleString("en-US",{timeZone:"America/New_York"}));
  const d=et.getDay(), m=et.getHours()*60+et.getMinutes();
  if(d===0||d===6) return "CLOSED";
  if(m>=570&&m<960) return "LIVE";
  if(m>=240&&m<570) return "PRE";
  if(m>=960&&m<1200) return "POST";
  return "CLOSED";
}
function updateMarket() {
  const s=getMS(), c={LIVE:"#10B981",PRE:"#3B82F6",POST:"#F59E0B",CLOSED:"#374151"};
  const dot=document.getElementById("market-dot");
  dot.style.cssText=`width:5px;height:5px;border-radius:50%;display:inline-block;margin-right:5px;background:${c[s]};${s==="LIVE"?"animation:blink 2s infinite":""}`;
  const lbl=document.getElementById("market-label");
  lbl.textContent="NYSE "+s; lbl.style.color=c[s];
}

// ── RSI CALCULATION ───────────────────────────────────────────────────────────
function calcRSI(closes, period=14) {
  if (closes.length < period+1) return null;
  let gains=0, losses=0;
  for (let i=1; i<=period; i++) {
    const d = closes[i]-closes[i-1];
    if(d>0) gains+=d; else losses+=Math.abs(d);
  }
  let avgGain=gains/period, avgLoss=losses/period;
  for (let i=period+1; i<closes.length; i++) {
    const d=closes[i]-closes[i-1];
    avgGain = (avgGain*(period-1)+(d>0?d:0))/period;
    avgLoss = (avgLoss*(period-1)+(d<0?Math.abs(d):0))/period;
  }
  if(avgLoss===0) return 100;
  return parseFloat((100-(100/(1+avgGain/avgLoss))).toFixed(1));
}

async function fetchRSI(sym) {
  // Check cache (5min)
  if (rsiCache[sym] && Date.now()-rsiCache[sym].ts < 5*60*1000) return rsiCache[sym];
  try {
    const r = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=30d`);
    const d = await r.json();
    const res = d?.chart?.result?.[0];
    if (!res) return null;
    const closes = res.indicators?.quote?.[0]?.close?.filter(v=>v!=null) ?? [];
    const m = res.meta;
    const prev = m.chartPreviousClose ?? m.previousClose ?? m.regularMarketPrice;
    let price=m.regularMarketPrice, session="CLOSE";
    if(m.marketState==="PRE"&&m.preMarketPrice){price=m.preMarketPrice;session="PRE";}
    if((m.marketState==="POST"||m.marketState==="POSTPOST")&&m.postMarketPrice){price=m.postMarketPrice;session="POST";}
    if(m.marketState==="REGULAR") session="LIVE";
    const rsi = calcRSI(closes);
    const obj = { rsi, price, chg: prev?parseFloat(((price-prev)/prev*100).toFixed(2)):0, session, ts:Date.now() };
    rsiCache[sym] = obj;
    return obj;
  } catch { return null; }
}

// ── AI SCORING — returns dynamic tickers per sector ───────────────────────────
async function fetchAIScores(event) {
  const secList = event.sectors.join(", ");

  const userMsg =
    "EVENT: " + event.label + "\n" +
    "DEMAND CHAIN: " + event.demandLogic + "\n\n" +
    "For each sector below, identify 3-5 NYSE/NASDAQ tickers most likely to see DEMAND SURGE (or drop) from this event.\n" +
    "Choose real, liquid tickers. Score -100 to +100. Positive=demand surge. Negative=demand drop.\n" +
    "Reasons max 10 words, ASCII only.\n\n" +
    "SECTORS: " + secList + "\n\n" +
    'Return ONLY this JSON structure:\n' +
    '{"eventIntensity":65,"signal":"ELEVATED","lastSignal":"current situation in Spanish","demandSummary":"demand chain in Spanish","headlines":[{"title":"","source":"","impact":"BULLISH","summary":""}],"sectors":[{"name":"sector name","dir":"LONG","tickers":[{"sym":"XOM","score":75,"reason":"oil supply restricted drives upstream demand"}]}]}';

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      model:"claude-sonnet-4-6",
      max_tokens:2000,
      system:"You are a JSON-only financial analysis engine. Output ONLY valid JSON starting with {. No prose, no markdown, no backticks.",
      messages:[{role:"user",content:userMsg}]
    })
  });

  if(!res.ok){ const t=await res.text(); throw new Error("HTTP "+res.status+": "+t.slice(0,100)); }
  const data = await res.json();
  if(data.type==="error") throw new Error(data.error?.message??"API error");

  const raw = (data.content??[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim()
    .replace(/^```[a-z]*\n?/i,"").replace(/\n?```$/i,"").trim();

  if(!raw) throw new Error("Empty response");
  const s=raw.indexOf("{"), e=raw.lastIndexOf("}");
  if(s===-1) throw new Error("No JSON. Got: "+raw.slice(0,80));
  return JSON.parse(raw.slice(s,e+1));
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const scColor  = s => s==null?"#141414":s>0?`rgba(16,185,129,${0.1+Math.min(s/100,1)*0.55})`:`rgba(239,68,68,${0.1+Math.min(Math.abs(s)/100,1)*0.55})`;
const scBorder = s => s==null?"#1f1f1f":s>40?"#10B98155":s<-40?"#EF444455":"#1f1f1f";
const fmtSc    = s => s>0?"+"+s:""+s;
const fmtChg   = c => c>=0?"+"+c+"%":c+"%";
const iCol     = n => n>=70?"#EF4444":n>=40?"#F59E0B":"#10B981";
const sesCol   = {LIVE:"#10B981",PRE:"#3B82F6",POST:"#F59E0B",CLOSE:"#374151"};
const impCol   = {BULLISH:"#10B981",BEARISH:"#EF4444",NEUTRAL:"#374151"};

function rsiColor(rsi) {
  if(rsi==null) return "#374151";
  if(rsi<=30) return "#3B82F6";      // strong oversold — blue
  if(rsi<=35) return "#60A5FA";      // oversold — light blue
  if(rsi>=70) return "#F59E0B";      // strong overbought — amber
  if(rsi>=65) return "#FCD34D";      // overbought — yellow
  return "#374151";                  // neutral — gray
}
function rsiLabel(rsi) {
  if(rsi==null) return "";
  if(rsi<=30) return "OVERSOLD";
  if(rsi<=35) return "OVS";
  if(rsi>=70) return "OVERBOUGHT";
  if(rsi>=65) return "OVB";
  return "";
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderSidebar() {
  let html="";
  for(const [cat,meta] of Object.entries(CAT)){
    html+=`<div class="cat-hdr"><span>${meta.dot}</span><span class="cat-lbl" style="color:${meta.color}">${meta.label}</span></div>`;
    for(const ev of EVENTS.filter(e=>e.cat===cat)){
      const isA=ev.id===activeId, eAI=aiCache[ev.id];
      const sig=eAI?.signal;
      const bc=sig==="ACTIVE"?"#EF4444":sig==="ELEVATED"?"#F59E0B":"#10B981";
      html+=`<button class="ev-btn${isA?" active":""}" onclick="switchEvent('${ev.id}')" style="border-left-color:${isA?meta.color:"transparent"}">
        <div class="ev-title">${ev.label}${sig?`<span class="sig-badge" style="background:${bc}22;color:${bc}">${sig}</span>`:""}</div>
        <div class="ev-desc-s">${ev.desc}</div>
      </button>`;
    }
  }
  document.getElementById("sidebar").innerHTML=html;
}

function renderMobilePills() {
  if(window.innerWidth>768){document.getElementById("mobile-pills").style.display="none";return;}
  document.getElementById("mobile-pills").style.display="block";
  let html="";
  for(const [cat,meta] of Object.entries(CAT)){
    for(const ev of EVENTS.filter(e=>e.cat===cat)){
      const isA=ev.id===activeId;
      html+=`<span onclick="switchEvent('${ev.id}')" style="display:inline-block;margin-right:5px;padding:4px 9px;border-radius:12px;font-size:9px;cursor:pointer;letter-spacing:1px;font-weight:${isA?700:400};background:${isA?meta.color+"22":"#111"};color:${isA?meta.color:"#555"};border:1px solid ${isA?meta.color:"#222"}">${meta.dot} ${ev.label}</span>`;
    }
  }
  document.getElementById("mobile-pills").innerHTML=html;
}

function renderTabs() {
  let html="";
  EVENTS.forEach((ev,i)=>{
    const meta=CAT[ev.cat], isA=ev.id===activeId, eAI=aiCache[ev.id];
    html+=`<button class="tab-btn${isA?" active":""}" onclick="switchEvent('${ev.id}')" style="border-top-color:${isA?meta.color:"transparent"}">
      <span class="tab-num">${i+1}</span>
      <span class="tab-icon" style="color:${isA?meta.color:"#2a2a2a"}">${meta.dot}</span>
      <span class="tab-name">${ev.label.toUpperCase()}</span>
      ${eAI?.signal==="ACTIVE"?`<div class="tab-live"></div>`:""}
    </button>`;
  });
  html+=`<div id="tabs-right"><span id="scan-lbl">SCANNING···</span></div>`;
  document.getElementById("tabs").innerHTML=html;
}

function renderEventHeader(event, ai) {
  const meta=CAT[event.cat];
  let html=`<div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div style="flex:1">
      <div class="ev-cat-tag" style="color:${meta.color}">${meta.dot} ${meta.label}</div>
      <div class="ev-name">${event.label}</div>
      <div class="ev-desc-t">${event.desc}</div>
      <div class="logic-pill"><span class="logic-tag">LOGICA</span><span class="logic-txt">${event.demandLogic}</span></div>
    </div>
    ${ai?.eventIntensity!=null?`<div style="text-align:right;flex-shrink:0;margin-left:16px"><div class="int-num" style="color:${iCol(ai.eventIntensity)}">${ai.eventIntensity}</div><div style="font-size:8px;color:#333;letter-spacing:2px">INTENSITY</div></div>`:""}
  </div>`;
  if(ai?.eventIntensity!=null){
    const sc=ai.signal==="ACTIVE"?"#EF4444":ai.signal==="ELEVATED"?"#F59E0B":"#10B981";
    html+=`<div class="int-row"><span class="int-lbl">INTENSIDAD</span><div class="int-bar-wrap"><div class="int-bar" style="width:${ai.eventIntensity}%;background:${iCol(ai.eventIntensity)}"></div></div><span class="sig-badge" style="background:${sc}22;color:${sc};font-size:8px;padding:2px 6px">${ai.signal}</span></div>`;
  }
  if(ai?.lastSignal) html+=`<div class="last-sig">› ${ai.lastSignal}</div>`;
  document.getElementById("ev-hdr").innerHTML=html;
  document.getElementById("ev-hdr").style.borderBottomColor=meta.color+"18";
}

function renderLoading() {
  document.getElementById("ev-hdr").insertAdjacentHTML("beforeend",
    `<div class="ai-loading" id="ai-load-ind">
      <div class="ai-dot" style="animation:blink 1.2s ease 0s infinite"></div>
      <div class="ai-dot" style="animation:blink 1.2s ease 0.2s infinite"></div>
      <div class="ai-dot" style="animation:blink 1.2s ease 0.4s infinite"></div>
      <span class="ai-txt">INFIRIENDO DEMANDA · BUSCANDO TICKERS···</span>
    </div>`);
  const sl=document.getElementById("scan-lbl");
  if(sl) sl.style.display="inline";
}

function renderError(msg) {
  document.getElementById("ev-hdr").insertAdjacentHTML("beforeend",
    `<div class="err-row"><span class="err-txt">⚠ ${msg}</span><button class="retry-btn" onclick="scan(true)">REINTENTAR</button></div>`);
  const sl=document.getElementById("scan-lbl");
  if(sl) sl.style.display="none";
}

function renderTopMovers(sectors) {
  if(!sectors?.length){document.getElementById("top-movers").innerHTML="";return;}
  const all=sectors.flatMap(s=>s.tickers||[]).sort((a,b)=>Math.abs(b.score)-Math.abs(a.score)).slice(0,6);
  if(!all.length){document.getElementById("top-movers").innerHTML="";return;}
  let html=`<span class="mover-lbl">MAYOR SENAL</span>`;
  for(const t of all){
    const c=t.score>0?"#10B981":"#EF4444";
    html+=`<span class="mover-chip" style="background:${c}14;color:${c};border:1px solid ${c}30">${t.sym} ${fmtSc(t.score)}</span>`;
  }
  document.getElementById("top-movers").innerHTML=html;
}

function renderHeatmap(event, ai) {
  const sectors = ai?.sectors ?? [];
  const loadingAI = aiRunning;
  let html="";

  if(!sectors.length && loadingAI){
    html=`<div style="padding:20px 0;color:#2a2a2a;font-size:9px;letter-spacing:2px">BUSCANDO TICKERS RELEVANTES···</div>`;
    document.getElementById("heatmap").innerHTML=html;
    return;
  }
  if(!sectors.length){
    html=`<div style="padding:20px 0;color:#2a2a2a;font-size:9px">Sin datos — presioná SCAN</div>`;
    document.getElementById("heatmap").innerHTML=html;
    return;
  }

  for(const sec of sectors){
    const dc={LONG:"#10B981",SHORT:"#EF4444",WATCH:"#F59E0B"}[sec.dir]??"#F59E0B";
    const dl={LONG:"▲ LONG",SHORT:"▼ SHORT",WATCH:"◈ WATCH"}[sec.dir]??"◈ WATCH";
    const tickers=sec.tickers||[];
    const scVals=tickers.map(t=>t.score).filter(v=>v!=null);
    const avg=scVals.length?Math.round(scVals.reduce((a,b)=>a+b,0)/scVals.length):null;

    html+=`<div class="sec-block">
      <div class="sec-hdr">
        <span class="sec-dir" style="color:${dc}">${dl}</span>
        <span class="sec-name">${sec.name.toUpperCase()}</span>
        ${avg!=null?`<span class="sec-avg" style="color:${avg>0?"#10B981":"#EF4444"}">avg ${fmtSc(avg)}</span>`:""}
        <div class="sec-line"></div>
        <span class="sec-note">AI dynamic tickers</span>
      </div>
      <div class="tickers-row">`;

    for(const t of tickers){
      const rd=rsiCache[t.sym];
      const rsi=rd?.rsi;
      const rsiC=rsiColor(rsi);
      const rsiL=rsiLabel(rsi);
      const hot=Math.abs(t.score)>=50;
      const sesC=rd?.session?sesCol[rd.session]:"";

      html+=`<div class="tc" style="background:${scColor(t.score)};border:1px solid ${scBorder(t.score)};box-shadow:${hot?("0 0 10px "+(t.score>0?"#10B98118":"#EF444418")):"none"}">
        ${rd?.session?`<span class="ses-tag" style="color:${sesC}">${rd.session}</span>`:""}
        ${hot?`<div class="hot-dot" style="background:${t.score>0?"#10B981":"#EF4444"}"></div>`:""}
        <div class="sym" style="margin-top:${rd?.session?8:0}px">${t.sym}</div>
        <div class="score-val" style="color:${t.score>0?"#10B981":t.score<0?"#EF4444":"#555"}">${fmtSc(t.score)}</div>
        <div class="rsi-row">
          ${rsi!=null
            ? `<span class="rsi-val" style="color:${rsiC}">RSI ${rsi}</span>${rsiL?`<span class="rsi-badge" style="background:${rsiC}22;color:${rsiC}">${rsiL}</span>`:""}`
            : `<div class="rsi-loading"></div>`
          }
        </div>
        ${rd?.price!=null?`<div class="price-row"><span class="pv">$${rd.price.toFixed(2)}</span><span class="cv" style="color:${rd.chg>=0?"#10B98166":"#EF444466"}">${fmtChg(rd.chg)}</span></div>`:""}
        <div class="tooltip">${t.reason||""}</div>
      </div>`;
    }
    html+=`</div></div>`;
  }
  document.getElementById("heatmap").innerHTML=html;
}

function renderWire(ai) {
  const ds=document.getElementById("demand-sum"), dt=document.getElementById("ds-txt");
  if(ai?.demandSummary){ds.style.display="block";dt.textContent=ai.demandSummary;}
  else ds.style.display="none";
  const feed=document.getElementById("wire-feed");
  if(!ai?.headlines?.length){feed.innerHTML='<div id="wire-empty">SIN SEÑALES</div>';return;}
  let html="";
  for(const h of ai.headlines){
    const dc=impCol[h.impact]??"#374151";
    html+=`<div class="hl-item"><div class="hl-meta"><div class="hl-dot" style="background:${dc}"></div><span class="hl-src">${(h.source??"").toUpperCase()}</span></div><div class="hl-title">${h.title}</div><div class="hl-sum">${h.summary}</div></div>`;
  }
  feed.innerHTML=html;
}

// ── RSI REFRESH for current event tickers ────────────────────────────────────
async function refreshRSI() {
  const ai = aiCache[activeId];
  if(!ai?.sectors) return;
  const tickers = [...new Set(ai.sectors.flatMap(s=>(s.tickers||[]).map(t=>t.sym)))];
  // fetch in parallel, re-render as each comes in
  await Promise.allSettled(tickers.map(async sym => {
    await fetchRSI(sym);
    // partial re-render of just heatmap
    renderHeatmap(EVENTS.find(e=>e.id===activeId), aiCache[activeId]);
  }));
}

// ── FULL RENDER ───────────────────────────────────────────────────────────────
function render(loadingAI, error) {
  const event=EVENTS.find(e=>e.id===activeId);
  const ai=aiCache[activeId];
  renderSidebar();
  renderTabs();
  renderMobilePills();
  renderEventHeader(event, ai);
  if(loadingAI && !ai) renderLoading();
  if(error) renderError(error);
  if(ai) renderTopMovers(ai.sectors);
  renderHeatmap(event, ai);
  renderWire(ai);
  updateMarket();
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function switchEvent(id) {
  activeId=id;
  render(aiRunning, null);
  runAI(false);
}

async function runAI(force) {
  if(aiRunning) return;
  const ex=aiCache[activeId];
  if(!force && ex && Date.now()-ex.ts < 5*60*1000) { refreshRSI(); return; }
  aiRunning=true;
  const btn=document.getElementById("scan-btn");
  if(btn){btn.textContent="···";btn.disabled=true;}
  render(true, null);
  const event=EVENTS.find(e=>e.id===activeId);
  try {
    const result=await fetchAIScores(event);
    aiCache[activeId]={...result,ts:Date.now()};
    render(false, null);
    refreshRSI(); // fetch RSI for all returned tickers
  } catch(e) {
    render(false, e.message);
  }
  aiRunning=false;
  if(btn){btn.textContent="↺ SCAN";btn.disabled=false;}
  const sl=document.getElementById("scan-lbl");
  if(sl) sl.style.display="none";
}

async function scan(force=false) { await runAI(force); }

function toggleWire() {
  document.getElementById("wire").classList.toggle("open");
}

// ── INIT ──────────────────────────────────────────────────────────────────────
setInterval(updateMarket, 1000);
setInterval(refreshRSI, 60000);

render(false, null);
runAI(false);
</script>
